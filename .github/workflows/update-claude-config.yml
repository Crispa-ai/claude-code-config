name: Update Claude Config

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'

  # Allow manual trigger
  workflow_dispatch:

  # Can be triggered by other workflows
  repository_dispatch:
    types: [update-claude-config]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history to properly update submodule
          fetch-depth: 0

      - name: Check if .claude/.shared exists
        id: check_shared
        run: |
          if [ -d ".claude/.shared" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ .claude/.shared directory not found. Shared config may not be installed."
          fi

      - name: Update shared configuration
        if: steps.check_shared.outputs.exists == 'true'
        id: update
        run: |
          cd .claude/.shared

          # Store current commit hash
          OLD_HASH=$(git rev-parse HEAD)
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT

          # Fetch and pull latest changes
          git fetch origin main
          git reset --hard origin/main

          # Get new commit hash
          NEW_HASH=$(git rev-parse HEAD)
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT

          # Check if there were updates
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "✅ Updates found: $OLD_HASH -> $NEW_HASH"

            # Get commit messages for PR body
            git log --pretty=format:"- %s" "$OLD_HASH..$NEW_HASH" > /tmp/changes.txt
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No updates available"
          fi

          cd ../..

      - name: Get changed files
        if: steps.update.outputs.has_updates == 'true'
        id: changes
        run: |
          cd .claude/.shared
          FILES=$(git diff --name-only ${{ steps.update.outputs.old_hash }} ${{ steps.update.outputs.new_hash }})
          echo "Changed files:"
          echo "$FILES"
          cd ../..

          # Save to output (escape newlines)
          {
            echo 'files<<EOF'
            echo "$FILES"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.update.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update shared Claude Code configuration"
          title: "chore: update shared Claude Code configuration"
          body: |
            🔄 **Automated Update: Claude Code Shared Configuration**

            This PR updates the shared Claude Code agents and skills to the latest version.

            ## Changes
            The following files were updated in `.claude/.shared/`:

            ${{ steps.changes.outputs.files }}

            ## Commits
            ${{ steps.update.outputs.old_hash }} → ${{ steps.update.outputs.new_hash }}

            Changes from upstream repository:
            $(cat /tmp/changes.txt)

            ## What to Review
            - Check if any agents or skills have breaking changes
            - Verify symlinks are still correct
            - Test that agents work as expected

            ## Merge Strategy
            This is an automated update. Review the changes and merge when ready.

            ---
            🤖 Generated by [Update Claude Config Action](https://github.com/crispa-org/claude-code-config)
          branch: update-claude-config
          delete-branch: true
          labels: |
            dependencies
            automated
            claude-code

      - name: Summary
        run: |
          if [ "${{ steps.check_shared.outputs.exists }}" != "true" ]; then
            echo "⚠️ Shared configuration not found. Install it with:"
            echo "   curl -fsSL https://raw.githubusercontent.com/crispa-org/claude-code-config/main/install.sh | bash"
          elif [ "${{ steps.update.outputs.has_updates }}" != "true" ]; then
            echo "✅ Shared configuration is already up to date"
          else
            echo "✅ Created PR with latest Claude Code configuration updates"
          fi
